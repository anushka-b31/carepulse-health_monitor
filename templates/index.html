<!DOCTYPE html>
<html>

<head>
<title>CarePulse – Remote Health Monitor</title>

<style>

body{
font-family:'Segoe UI', Arial;
background:linear-gradient(135deg,#4facfe,#00c6ff);
margin:0;
padding:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
width:420px;
border-radius:14px;
box-shadow:0 12px 35px rgba(0,0,0,0.25);
text-align:center;
}

h1{
margin:0;
color:#2c3e50;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

input{
width:95%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

label{
font-weight:500;
display:block;
text-align:left;
margin-top:10px;
color:#2c3e50;
}

button{
margin-top:15px;
background:#3498db;
color:white;
border:none;
padding:12px;
font-size:16px;
border-radius:8px;
cursor:pointer;
width:100%;
transition:0.3s;
}

button:hover{
background:#2c7be5;
transform:scale(1.03);
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>CarePulse</h1>
<p class="subtitle">AI Remote Health Monitoring</p>

<form action="/submit" method="POST">

<label>❤️ Heart Rate (bpm)</label>
<input type="number" name="heart_rate" placeholder="Enter heart rate" required>

<label>🫁 Oxygen Level SpO₂ (%)</label>
<input type="number" name="spo2" placeholder="Enter oxygen level" required>

<label>🌡 Body Temperature (°C)</label>
<input type="number" step="0.1" name="temperature" placeholder="Enter temperature" required>

<label>📝 Symptoms</label>
<input type="text" name="symptoms" placeholder="Enter symptoms (optional)">

<button type="submit">Analyze Health</button>

</form>

<div class="footer">
Remote Health Monitoring System
</div>

</div>

</body>

</html>
